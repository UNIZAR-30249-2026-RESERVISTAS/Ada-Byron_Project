services:
  postgis:
    image: 'kartoza/postgis:14'
    healthcheck:
      test: pg_isready -h localhost -U proyecto -d proyectodb
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      org.springframework.boot.service-connection: postgres
    ports:
      - "25432:5432"
    environment:
      - 'POSTGRES_USER=proyecto'
      - 'POSTGRES_PASSWORD=proyectovm'
      - 'POSTGRES_DB=proyectodb'
      - 'DEFAULT_ENCODING=UTF8'
    volumes:
      - 'dbdata:/var/lib/postgresql/data'
  pygeoapi:
    image: 'geopython/pygeoapi:latest'
    ports:
      - "5000:80"
    environment:
      - 'PYGEOAPI_CONFIG=/pygeoapi/local.config.yml'
    volumes:
      - './pygeoapi-config-act.yml:/pygeoapi/local.config.yml'
    depends_on:
      - 'postgis'
volumes:
  dbdata:
    external: true