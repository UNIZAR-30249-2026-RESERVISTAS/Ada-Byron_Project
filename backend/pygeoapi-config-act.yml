    planta0:
        type: collection
        title:
          en: Planta 0
        description:
          en: Planta 0 del Ada Byron
        keywords:
            - EINA
            - Ada Byron
            - Planta0
        links: []
        extents:
            spatial:
                bbox: [-0.889398, 41.683132, -0.888271, 41.684061]
                crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
        providers:
            - type: feature
              name: PostgreSQL
              data:
                  host: postgis
                  port: 5432
                  dbname: proyectodb
