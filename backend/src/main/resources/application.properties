spring.application.name=backend

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuración de la cookie de sesión, mientrás hago uso de HTTP
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# Cuando tenga HTTPS, cambiar a secure=true y same-site=strict para mayor seguridad

# Configuración de SWAGGER
# URL del json de la documentación de la API:  http://localhost:8080/api-docs
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.url=/api-docs
# URL para acceder a la documentación de la API vía UI:http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
# Ordenamos los endpoints alfabéticamente en la UI de Swagger
springdoc.swagger-ui.operationsSorter=alpha