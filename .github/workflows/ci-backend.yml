name: CI — Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  detectar-cambios:
    name: Compilar y verificar Backend
    runs-on: ubuntu-latest
    outputs:
      hay-cambios: ${{ steps.filtro.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filtro
        with:
          filters: |
            backend:
              - 'backend/**'

  build:
    name: Build Backend
    needs: detectar-cambios
    if: needs.detectar-cambios.outputs.hay-cambios == 'true'
    runs-on: ubuntu-latest

    services:
      postgis:
        image: kartoza/postgis:14
        env:
          POSTGRES_USER: proyecto
          POSTGRES_PASSWORD: proyectovm
          POSTGRES_DB: proyectodb
          DEFAULT_ENCODING: UTF8
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -h localhost -U proyecto -d proyectodb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Caché de dependencias Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: Dar permisos a gradlew
        working-directory: backend
        run: chmod +x gradlew

      - name: Compilar y ejecutar tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/proyectodb
          SPRING_DATASOURCE_USERNAME: proyecto
          SPRING_DATASOURCE_PASSWORD: proyectovm
          SPRING_DOCKER_COMPOSE_ENABLED: false
        run: ./gradlew build --no-daemon

      - name: Publicar resultados de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-backend
          path: backend/build/reports/tests/