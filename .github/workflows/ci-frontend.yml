name: CI — Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  detectar-cambios:
    name: Compilar y verificar Frontend
    runs-on: ubuntu-latest
    outputs:
      hay-cambios: ${{ steps.filtro.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filtro
        with:
          filters: |
            frontend:
              - 'frontend/**'

  build:
    name: Build Frontend
    needs: detectar-cambios
    if: needs.detectar-cambios.outputs.hay-cambios == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/front/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend/front
        run: npm ci

      - name: Compilar proyecto
        working-directory: frontend/front
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_API_URL: http://localhost:8081
        run: npm run build